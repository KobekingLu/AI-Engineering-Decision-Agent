name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile packages
        run: python -m compileall decision_agent web_app

      - name: Run decision-agent smoke case
        run: python -m decision_agent.run_case decision_agent/input/case_001_normalized.json

      - name: Check smoke output
        run: test -f output/decision_agent/case_001_normalized.decision_summary.json
